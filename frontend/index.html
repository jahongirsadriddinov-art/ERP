
  <!DOCTYPE html>
  <html lang="uz">
    <head>

      <meta charset="UTF-8" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

      <!-- Tema-chaqnashini (FOUC) oldini olish: React yuklanib, useEffect ishga
           tushguncha (bu bir necha yuz ms yoki sekin tarmoqda undan ham ko'p
           vaqt olishi mumkin) sahifa har doim standart yorug' fon bilan
           chizilar edi — hatto foydalanuvchi qorong'i rejimni tanlagan bo'lsa
           ham. Shu bloklovchi skript birinchi chizishdan OLDIN to'g'ri
           rejimni <html>'ga qo'yadi (App.tsx'dagi asosiy useEffect keyin
           to'liq rang-temani qo'llайdi — bu faqat yorug'/qorong'i sakrashini
           yo'qotadi, chunki u eng sezilarli farq). -->
      <script>
        (function () {
          try {
            var mode = localStorage.getItem('erp_themeMode');
            var isDark = mode === 'dark' || (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
              document.documentElement.classList.add('dark');
              document.documentElement.style.colorScheme = 'dark';
            }
          } catch (e) {}
        })();
      </script>
      <style>
        html { background: #F4F6FA; }
        html.dark { background: #0B1220; }
        body { background: inherit; }
      </style>
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <title>QurilishERP — Qurilish firmalari uchun boshqaruv tizimi</title>
      <meta name="description" content="Qurilish firmalari uchun ERP tizimi — loyihalar, materiallar, moliya, xodimlar boshqaruvi, real-time chat va AI yordamchi." />
      <meta name="robots" content="index, follow" />
      <link rel="canonical" href="https://www.erp-firma.uz/" />
      <meta property="og:type" content="website" />
      <meta property="og:site_name" content="QurilishERP" />
      <meta property="og:title" content="QurilishERP — Qurilish firmalari uchun boshqaruv tizimi" />
      <meta property="og:description" content="Loyihalar, materiallar, moliya va xodimlarni bir joyda boshqaring. Real-time chat, AI yordamchi, Telegram integratsiyasi." />
      <meta property="og:locale" content="uz_UZ" />
      <meta property="og:url" content="https://www.erp-firma.uz/" />
      <meta name="twitter:card" content="summary" />
      <meta name="twitter:title" content="QurilishERP — Qurilish firmalari uchun boshqaruv tizimi" />
      <meta name="twitter:description" content="Loyihalar, materiallar, moliya va xodimlarni bir joyda boshqaring." />

      <!-- Shriftlar — preconnect + asinxron <link> (render-blocking EMAS).
           media="print" + onload="this.media='all'" — standart "loadCSS"
           usuli: brauzer faylni erta yuklaydi, lekin sahifa chizilishini
           kutmaydi (font-display:swap allaqachon bor, shuning uchun matn
           darhol tizim shrifti bilan ko'rinadi, keyin shriftga almashadi). -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'" />
      <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" /></noscript>

      <style>
        html, body { height: 100%; margin: 0; }
        #root { height: 100%; }
        /* React hali mount bo'lmaguncha ko'rinadigan statik yuklanish belgisi —
           `#root` ichida, shuning uchun `createRoot().render()` uni avtomatik
           almashtiradi (qo'shimcha JS/tozalash kerak emas). */
        #initial-loader {
          height: 100%; display: flex; align-items: center; justify-content: center;
        }
        #initial-loader .spinner {
          width: 34px; height: 34px; border-radius: 50%;
          border: 3px solid color-mix(in srgb, #1B3A6B 18%, transparent);
          border-top-color: #1B3A6B;
          animation: initial-spin 0.7s linear infinite;
        }
        html.dark #initial-loader .spinner {
          border-color: color-mix(in srgb, #3E6DB5 22%, transparent);
          border-top-color: #3E6DB5;
        }
        @keyframes initial-spin { to { transform: rotate(360deg); } }
      </style>

    </head>

    <body>

      <div id="root"><div id="initial-loader"><div class="spinner"></div></div></div>
      <script type="module" src="/src/main.tsx"></script>

    </body>
  </html>
